name: Build Carrot Artifacts

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install root dependencies
        run: bun install

      - name: Cache Zig compiler
        id: zig-cache
        uses: actions/cache@v4
        with:
          path: vendors/zig
          key: zig-0.13.0-${{ runner.os }}-${{ runner.arch }}

      - name: Download Zig if not cached
        if: steps.zig-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p vendors/zig
          ZIG_VERSION="0.13.0"
          ZIG_ARCH="macos-aarch64"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-${ZIG_ARCH}-${ZIG_VERSION}.tar.xz" | tar -xJ --strip-components=1 -C vendors/zig

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: llama/llama-cli/deps/llama.cpp
          key: llama-cpp-built-v1-${{ runner.os }}-${{ runner.arch }}
          restore-keys: |
            llama-cpp-built-v1-${{ runner.os }}-

      - name: Setup and build llama.cpp libraries
        run: |
          # Clone llama.cpp if not cached
          if [ ! -d "llama/llama-cli/deps/llama.cpp" ]; then
            cd llama/llama-cli && bash setup-llama.sh && cd ../..
          fi
          # Build static libraries with CMake if not already built
          LLAMA_CPP_DIR="llama/llama-cli/deps/llama.cpp"
          BUILD_DIR="$LLAMA_CPP_DIR/build"
          if [ ! -f "$BUILD_DIR/src/libllama.a" ]; then
            mkdir -p "$BUILD_DIR"
            cd "$BUILD_DIR"
            cmake .. -DGGML_METAL=OFF -DGGML_CUDA=OFF -DGGML_OPENMP=OFF -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release
            cmake --build . --config Release
            cd ../../../..
          fi

      - name: Install carrot dependencies
        run: |
          for carrot in git pty search tsserver biome llama dash; do
            if [ -f "$carrot/package.json" ]; then
              echo "Installing deps for $carrot..."
              cd "$carrot" && bun install && cd ..
            fi
          done

      - name: Build all carrots
        env:
          ZIG_BINARY: ${{ github.workspace }}/vendors/zig/zig
        run: |
          mkdir -p artifacts
          for carrot in git pty search tsserver biome llama dash; do
            echo "=== Building $carrot ==="
            cd "$carrot"
            npx electrobun build --env=canary
            find artifacts -name "*.tar.zst" -exec cp {} ../artifacts/ \;
            cd ..
          done
          echo "=== Artifacts ==="
          ls -la artifacts/

      - name: Upload artifacts to R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ github.ref_name == 'production' && 'bunny-cloud-prod' || 'bunny-cloud-staging' }}
        run: bun run scripts/upload-to-r2.ts -- artifacts
