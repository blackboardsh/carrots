name: Build Carrot Artifacts

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install root dependencies
        run: bun install

      - name: Cache Zig compiler
        uses: actions/cache@v4
        with:
          path: node_modules/electrobun/vendors/zig
          key: zig-${{ runner.os }}-carrots

      - name: Cache llama.cpp
        uses: actions/cache@v4
        with:
          path: llama/llama-cli/deps/llama.cpp
          key: llama-cpp-${{ runner.os }}-${{ hashFiles('llama/llama-cli/setup-llama.sh') }}

      - name: Setup llama.cpp deps
        run: |
          if [ ! -d "llama/llama-cli/deps/llama.cpp" ]; then
            cd llama/llama-cli && bash setup-llama.sh
          fi

      - name: Install carrot dependencies
        run: |
          for carrot in git pty search tsserver biome llama dash; do
            if [ -f "$carrot/package.json" ]; then
              echo "Installing deps for $carrot..."
              cd "$carrot" && bun install && cd ..
            fi
          done

      - name: Build all carrots
        run: |
          mkdir -p artifacts
          for carrot in git pty search tsserver biome llama dash; do
            echo "=== Building $carrot ==="
            cd "$carrot"
            npx electrobun build --env=canary
            find build -name "*.tar.zst" -exec cp {} ../artifacts/ \;
            cd ..
          done
          echo "=== Artifacts ==="
          ls -la artifacts/

      - name: Upload artifacts to R2
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ github.ref_name == 'production' && 'bunny-cloud-prod' || 'bunny-cloud-staging' }}
        run: bun run scripts/upload-to-r2.ts -- artifacts
